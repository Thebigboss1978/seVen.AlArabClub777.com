<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تجربة نطق الصوت</title>
</head>
<body>
    <h1>مستعرض نطق النصوص التلقائي</h1>
    <textarea id="textToSpeak" rows="4" cols="50">مرحباً بك، هذا النص سيتم نطقه بأفضل صوت متاح على جهازك الحالي.</textarea>
    <br><br>
    <button onclick="startSpeaking()">اضغط هنا للنطق</button>

    <script>
    function startSpeaking() {
        const text = document.getElementById("textToSpeak").value.trim();
        if (!text) return;

        // إيقاف أي نطق معلق فوراً
        window.speechSynthesis.cancel();
        
        // تأخير بسيط جداً (50 ملي ثانية) لمنع كروم من إلغاء الأمر الجديد
        setTimeout(() => {
            window.utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            
            // جلب أول صوت عربي متاح
            const arabicVoice = voices.find(v => v.lang.startsWith('ar'));
            if (arabicVoice) window.utterance.voice = arabicVoice;
            
            window.speechSynthesis.speak(window.utterance);
        }, 50);
    }
    </script>
</body>
</html>
