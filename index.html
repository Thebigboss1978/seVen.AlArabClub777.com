<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎚️7𓂈</title>
    
    <!-- أيقونة التبويب برقم 7 سيادي بسيط -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 fill=%22%23D4AF37%22 font-family=%22sans-serif%22 font-weight=%22bold%22>7</text></svg>">

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --accent-color: #ffd700; /* لون الجوكر الذهبي */
            --text-main: #f3f4f6;
            --border-color: #1f2937;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: var(--accent-color);
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
            letter-spacing: 2px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 15px;
        }
        textarea {
            width: 100%;
            height: 150px;
            background-color: #070a12;
            color: #10b981; /* اللون الأخضر البرمجي لقراءة مريحة */
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s ease;
        }
        textarea:focus {
            border-color: var(--accent-color);
        }
        .status-bar {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #6b7280;
        }
        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            margin-left: 5px;
            box-shadow: 0 0 8px #10b981;
        }
        .pulse.active {
            background-color: var(--accent-color);
            box-shadow: 0 0 12px var(--accent-color);
            animation: blink 0.3s infinite alternate;
        }
        @keyframes blink { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>👑 المجدول الزمني السيادي — seVen Resident Runtime</h1>
    
    <textarea id="textToSpeak" placeholder="تلقيم مستمر للـ Scheduler.. ليقوم بضبط الميزان الزمني والضخ المباشر عبر الـ Driver المعزول..."></textarea>
    
    <div class="status-bar">
        <div>حالة الـ Driver الموحد: <span id="engine-light" class="pulse"></span> <span id="engine-text">جاري تهيئة العقل الأساسي...</span></div>
        <div>الهوية: Nexus.AlArabClub777</div>
    </div>
</div>

<script>
const textarea = document.getElementById("textToSpeak");
const engineLight = document.getElementById("engine-light");
const engineText = document.getElementById("engine-text");

// ==========================================
// 🛡️ 1. الـ Voice Driver المجرّد (المالك الوحيد للحالة)
// ==========================================
const VoiceDriver = {
    state: "IDLE", // الحالات الفاصلة المركزية: IDLE (خمول), BUSY (معالجة ونطق)
    voices: [],
    activeVoiceRef: null,
    watchdogInterval: null,
    lastActiveTime: Date.now(),

    // معامل روح الشخصية المتموجة (The Ghost Parameters) المستقرة عبر الأنظمة
    character: {
        baseRate: 1.00,
        basePitch: 1.00,
        varianceRate: 0.04,  // ميزان تموج السرعة العشوائي
        variancePitch: 0.02  // ميزان تموج النبرة العشوائي
    },

    init() {
        this.voices = window.speechSynthesis.getVoices() || [];
        this.autoPickBestVoice();
        this.refreshStateView("IDLE");
        this.startSovereignWatchdog();
    },

    autoPickBestVoice() {
        const arabicVoices = this.voices.filter(v => v.lang.startsWith('ar'))
            .sort((a, b) => (b.name.includes('Premium') ? 1 : 0) - (a.name.includes('Premium') ? 1 : 0));
        
        if (arabicVoices.length > 0) {
            this.activeVoiceRef = arabicVoices[0];
        }
    },

    // الـ Utterance معزول ومخفي تماماً كـ Packet عابرة تنشأ وتموت داخل الـ Driver فقط
    executePacketDelivery(cleanPulseText, onPacketEnd) {
        this.state = "BUSY";
        this.lastActiveTime = Date.now();
        this.refreshStateView("BUSY");

        let packet = new SpeechSynthesisUtterance(cleanPulseText);
        if (this.activeVoiceRef) packet.voice = this.activeVoiceRef;

        // توليد الروح البشرية على مستوى الـ Packet الزمنية دون المساس بنوع الصوت الخام
        packet.rate = +(this.character.baseRate + (Math.random() * this.character.varianceRate * 2 - this.character.varianceRate)).toFixed(2);
        packet.pitch = +(this.character.basePitch + (Math.random() * this.character.variancePitch * 2 - this.character.variancePitch)).toFixed(2);

        // نحر فوري للأثر النصي في ممر المعالجة (Anti-Sniffing)
        cleanPulseText = null;

        packet.onend = () => {
            packet = null;
            this.lastActiveTime = Date.now();
            onPacketEnd(); // إشعار المجدول لسحب الشحنة القادمة تلقائياً بشكل طبيعي
        };

        packet.onerror = () => {
            packet = null;
            onPacketEnd();
        };

        window.speechSynthesis.speak(packet);
    },

    // المقاطعة السيادية: معزولة عن خط الإنتاج الطبيعي ولا تُستدعى روتينياً لمنع تجميد الماك
    sovereignInterruption() {
        window.speechSynthesis.cancel();
        this.state = "IDLE";
        this.refreshStateView("IDLE");
    },

    startSovereignWatchdog() {
        clearInterval(this.watchdogInterval);
        this.watchdogInterval = setInterval(() => {
            // الحارس يسأل حالة الـ Driver الفعالة والموحدة فقط وليس المتصفح
            if (this.state === "BUSY" && (Date.now() - this.lastActiveTime > 3500)) {
                console.warn("🚨 الحارس رصد قفل حديدي في العتاد الخارجي. دفع هيدروليكي طارئ...");
                this.sovereignInterruption();
                Scheduler.consumeBufferTimeline(); // إجبار المجدول على إكمال المهمة
            }
        }, 2000);
    },

    refreshStateView(currentState) {
        if (currentState === "BUSY") {
            if (engineLight) engineLight.className = "pulse active";
            if (engineText) engineText.innerText = "ضخ متزامن عازل وحرق فوري للذاكرة الحية...";
        } else {
            const name = this.activeVoiceRef ? this.activeVoiceRef.name : "Local Engine";
            if (engineLight) engineLight.className = "pulse";
            if (engineText) engineText.innerText = `مقيم ومستقر على روح المحرك الحالي: [${name}]`;
        }
    }
};

// ==========================================
// 🧠 2. طبقة الـ Scheduler: إدارة البناء والميزان الزمني الصافي
// ==========================================
const Scheduler = {
    wordBufferQueue: [],

    feed(rawInput) {
        if (!rawInput) return;

        // نحر النص فور وصوله وتطهير الواجهة تماماً
        const words = rawInput.split(/\s+/).filter(w => w.length > 0);
        textarea.value = ""; 

        this.wordBufferQueue.push(...words);
        
        // التلقيم الفوري: إذا كان الـ Driver خامل، نبدأ الضخ
        if (VoiceDriver.state === "IDLE") {
            this.consumeBufferTimeline();
        }
    },

    consumeBufferTimeline() {
        if (this.wordBufferQueue.length === 0) {
            VoiceDriver.state = "IDLE";
            VoiceDriver.refreshStateView("IDLE");
            if (window.gc) window.gc();
            return;
        }

        let currentPulseWords = [];
        let estimatedPulseDuration = 0;
        
        const MS_PER_WORD = 120; 
        const MIN_DURATION = 350; 
        const MAX_DURATION = 750; // سقف النبضة الزمنية المستقر (300-800ms)

        while (this.wordBufferQueue.length > 0) {
            let nextWord = this.wordBufferQueue[0];
            let wordDuration = nextWord.length * 25 + MS_PER_WORD;

            if (estimatedPulseDuration + wordDuration > MAX_DURATION && currentPulseWords.length > 0) {
                break; 
            }

            currentPulseWords.push(this.wordBufferQueue.shift());
            estimatedPulseDuration += wordDuration;

            if (estimatedPulseDuration >= MIN_DURATION) break;
        }

        const cleanPulseText = currentPulseWords.join(" ");
        currentPulseWords = null;

        // تمرير الكتلة للـ Driver والتحكم من خلال الـ Callback الصافي دون علم المجدول بـ WebSpeech
        VoiceDriver.executePacketDelivery(cleanPulseText, () => {
            this.consumeBufferTimeline();
        });
    },

    hardReset() {
        this.wordBufferQueue = [];
        VoiceDriver.sovereignInterruption();
    }
};

// ==========================================
// 🛠️ 3. ربط أحداث واجهة التحكم الصامتة
// ==========================================
textarea.addEventListener('paste', () => setTimeout(() => Scheduler.feed(textarea.value.trim()), 50));
textarea.addEventListener('input', (e) => {
    if (e.inputType === 'insertFromPaste' || textarea.value.trim().length > 10) {
        Scheduler.feed(textarea.value.trim());
    }
});

if (window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = () => VoiceDriver.init();
}
VoiceDriver.init();
</script>

</body>
</html>
